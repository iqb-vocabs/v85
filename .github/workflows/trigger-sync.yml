name: Notify Vocabulary JSON

on:
  push:
    branches:
      - master
      - editor
jobs:
  notify-parent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger vocabulary-json sync workflow
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.VOCAB_JSON_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/iqb-vocabs/vocabulary-json/dispatches \
            -d '{"event_type": "vocab-updated", "client_payload": {"repo": "${{ github.event.repository.name }}"}}'
